# PARAM.SFO Tweaks for PS3 Homebrew
# Create these files or use them in PS3 PKG GUI

# For Jellyfin.pkg (Fixes 80029563 - CEX/NPDRM Signature)
[PARAM.SFO]
TITLE=Jellyfin PS3
TITLE_ID=NPUB31419
VERSION=01.00
CATEGORY=HG
APP_VER=01.00
RESOLUTION=720p
# IMPORTANT: Ensure 'CEX' is checked in your PKG builder to prevent signing errors
# Ensure 'NPDRM' is checked if you are on standard CFW (Evilnat/Rebug)

# For SMW-PS3.pkg (Fixes Black Screen - Force 720p)
[PARAM.SFO]
TITLE=Super Mario War PS3
TITLE_ID=NPUB31420
VERSION=01.00
CATEGORY=HG
APP_VER=01.00
RESOLUTION=720p
# If screen remains black, disable 'HDCP' in your PS3 Display Settings on the XMB.
# Often the game initializes hardware acceleration before the HDMI handshake completes.
EOF
