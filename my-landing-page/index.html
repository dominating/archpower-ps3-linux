<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mice - Agent Dashboard</title>
    <!-- Use vis-network for the mind map -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #0d1117; color: #c9d1d9; 
            font-family: 'Consolas', 'Courier New', monospace; 
            overflow: hidden;
        }
        #mynetwork { width: 100%; height: 100vh; border: none; outline: none; }
        #overlay { 
            position: absolute; top: 20px; left: 20px; z-index: 10; 
            pointer-events: none; background: rgba(13, 17, 23, 0.8);
            padding: 15px; border-radius: 8px; border: 1px solid #30363d;
        }
        h1 { margin: 0 0 5px 0; font-size: 1.2em; color: #58a6ff; }
        p { margin: 0; font-size: 0.9em; color: #8b949e; }
        .highlight { color: #7ee787; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>Mice: System Mind Map</h1>
        <p>Last Sync: <span class="highlight" id="sync-time"></span></p>
        <p>Update Interval: 24h</p>
    </div>

    <div id="mynetwork"></div>

    <script>
        // Set sync time
        document.getElementById('sync-time').innerText = new Date().toUTCString();

        // Data for the Mind Map
        var nodes = new vis.DataSet([
            // Core Node
            {id: 1, label: 'Mice (Agent Core)', shape: 'hexagon', color: {background: '#1f6feb', border: '#58a6ff'}, font: {color: 'white', size: 16}},
            
            // Categories
            {id: 2, label: 'API Usage', shape: 'box', color: {background: '#238636', border: '#2ea043'}, font: {color: 'white'}},
            {id: 3, label: 'System Availability', shape: 'box', color: {background: '#9e6a03', border: '#d29922'}, font: {color: 'white'}},
            {id: 4, label: 'Current Work', shape: 'box', color: '#8957e5', font: {color: 'white'}},

            // API Stats
            {id: 21, label: 'Gemini Pro\nStatus: Active\nUsage: 12k tkns/hr', shape: 'ellipse', color: '#30363d', font: {color: '#c9d1d9'}},
            {id: 22, label: 'Tavily Search\nStatus: API Linked\nUsage: Minimal', shape: 'ellipse', color: '#30363d', font: {color: '#c9d1d9'}},
            {id: 23, label: 'Vercel API\nStatus: Connected', shape: 'ellipse', color: '#30363d', font: {color: '#c9d1d9'}},

            // Availability Stats
            {id: 31, label: 'Host VPS\nUptime: 99.9%', shape: 'ellipse', color: '#30363d', font: {color: '#c9d1d9'}},
            {id: 32, label: 'Node Agent\nResponsive: Yes', shape: 'ellipse', color: '#30363d', font: {color: '#c9d1d9'}},
            {id: 33, label: 'GitHub Link\nSync: Stable', shape: 'ellipse', color: '#30363d', font: {color: '#c9d1d9'}},

            // Work Nodes
            {id: 41, label: 'Mind Map Dashboard\n[Deploying]', shape: 'ellipse', color: '#30363d', font: {color: '#c9d1d9'}},
            {id: 42, label: 'PolyArb Hunter\n[Planning Phase]', shape: 'ellipse', color: '#30363d', font: {color: '#c9d1d9'}},
            {id: 43, label: '24hr Cron Tasks\n[Configuring]', shape: 'ellipse', color: '#30363d', font: {color: '#c9d1d9'}}
        ]);

        var edges = new vis.DataSet([
            {from: 1, to: 2, color: {color: '#30363d'}}, 
            {from: 1, to: 3, color: {color: '#30363d'}}, 
            {from: 1, to: 4, color: {color: '#30363d'}},
            
            {from: 2, to: 21, color: {color: '#30363d'}}, 
            {from: 2, to: 22, color: {color: '#30363d'}}, 
            {from: 2, to: 23, color: {color: '#30363d'}},
            
            {from: 3, to: 31, color: {color: '#30363d'}}, 
            {from: 3, to: 32, color: {color: '#30363d'}}, 
            {from: 3, to: 33, color: {color: '#30363d'}},

            {from: 4, to: 41, color: {color: '#30363d'}}, 
            {from: 4, to: 42, color: {color: '#30363d'}},
            {from: 4, to: 43, color: {color: '#30363d'}}
        ]);

        var container = document.getElementById('mynetwork');
        var data = { nodes: nodes, edges: edges };
        var options = {
            physics: {
                stabilization: false,
                barnesHut: { springLength: 150, springConstant: 0.04 },
            },
            nodes: { borderWidth: 2, shadow: true },
            edges: { width: 2, shadow: true },
            interaction: { dragNodes: true, zoomView: true, dragView: true }
        };
        var network = new vis.Network(container, data, options);
    </script>
</body>
</html>
